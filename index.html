<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hoja D&D</title>
    <link rel="icon" type="image/png" href="Fogata.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #5d4037, transparent);
        }

        .divider-icon {
            margin: 0 10px;
            font-size: 18px;
            color: #5d4037;
        }

        #nombre {
            font-size: 2.5em;
            margin-bottom: 0;
            border: none;
            text-align: center;
        }

        .info-subtitle {
            text-align: center;
            font-style: italic;
            color: #5d4037;
            margin-top: 0;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="sheet">

        <div class="layout">

            <div>
                <h2 id="nombre"></h2>
                <div class="info-subtitle">
                    🌿 <span id="info"></span> 🌿
                </div>

                <div class="divider"><span class="divider-icon">⚔️</span></div>

                <h2>Atributos</h2>
                <div class="grid stats-grid" id="stats"></div>

                <div class="divider"><span class="divider-icon">🛡️</span></div>

                <h2>Combate</h2>
                <div id="combate"></div>
            </div>

            <div>
                <h2>Habilidades</h2>
                <div id="skills" class="skills-grid"></div>
            </div>

        </div>

        <div class="divider"><span class="divider-icon">📜</span></div>

        <h2>Conjuros</h2>
        <div id="Conjuros"></div>

        <div class="divider"><span class="divider-icon">✨</span></div>

        <h2>Trucos</h2>
        <div id="Trucos" style="text-align: center;"></div>

        <div class="divider"><span class="divider-icon">🎒</span></div>

        <h2>Equipo</h2>
        <div id="equipo"></div>

        <div class="divider"><span class="divider-icon">✍️</span></div>

        <h2>Notas</h2>
        <div id="notas" style="font-style: italic; text-align: center; padding: 10px;"></div>

        <!-- 🔥 IMAGEN AGREGADA -->
        <img src="Rosa.png" class="rosa-footer">

    </div>

    <script src="data.js"></script>

    <script>
        function mod(val) {
            return Math.floor((val - 10) / 2);
        }

        document.getElementById("nombre").innerText = personaje.nombre;
        document.getElementById("info").innerText =
            personaje.clase + " lvl " + personaje.nivel + " - " + personaje.Raza;

        let statsDiv = document.getElementById("stats");
        Object.entries(personaje.stats).forEach(([key, val]) => {
            let m = mod(val);
            statsDiv.innerHTML += `
                <div class="box">
                  <b>${key.toUpperCase()}</b>
                  <div>${val}</div>
                  <div>${m >= 0 ? "+" : ""}${m}</div>
                </div>
            `;
        });

        document.getElementById("combate").innerHTML = `
            <div style="display:flex; gap:20px; justify-content:center; font-weight:bold; color: #5d4037;">
                <span>🛡️ CA: ${personaje.combate.ca}</span>
                <span>❤️ HP: ${personaje.combate.hp_actual}/${personaje.combate.hp_max}</span>
            </div>
        `;

        function renderSkills() {
            let container = document.getElementById("skills");
            Object.entries(personaje.skills).forEach(([name, data]) => {
                let baseMod = mod(personaje.stats[data.stat]);
                let total = baseMod + (data.prof ? personaje.proficiency : 0);
                container.innerHTML += `
                    <div class="skill">
                        <span>${data.prof ? "●" : "○"} ${name.replace("_", " ")}</span>
                        <span style="font-weight:bold;">${total >= 0 ? "+" : ""}${total}</span>
                    </div>
                `;
            });
        }
        renderSkills();

        let conjurosHTML = "";
        personaje.Conjuros.forEach(c => {
            conjurosHTML += `<div style="margin-bottom:8px;"><b>${c.nombre}</b> (${c.bono}) — <i>${c.daño}</i></div>`;
        });
        document.getElementById("Conjuros").innerHTML = `<div style="text-align:center;">${conjurosHTML}</div>`;

        document.getElementById("Trucos").innerHTML = personaje.Trucos.join(" • ");

        document.getElementById("equipo").innerHTML =
            "<ul style='columns: 2; -webkit-columns: 2;'>" +
            personaje.equipo.map(e => `<li>${e}</li>`).join("") + "</ul>";

        document.getElementById("notas").innerText = personaje.notas;

    </script>
</body>

</html>
