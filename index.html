<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hoja D&D</title>

    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/Fogata.png">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="sheet">

        <div class="layout">

            <div>
                <h2 id="nombre"></h2>
                <div class="info-subtitle">
                    🌿 <span id="info"></span> 🌿
                </div>

                <div class="divider"><span class="divider-icon">⚔️</span></div>

                <h2>Atributos</h2>
                <div class="grid stats-grid" id="stats"></div>

                <div class="divider"><span class="divider-icon">🛡️</span></div>

                <h2>Combate</h2>
                <div id="combate"></div>
            </div>

            <div>
                <h2>Habilidades</h2>
                <div id="skills" class="skills-grid"></div>
            </div>

        </div>

        <div class="divider"><span class="divider-icon">📜</span></div>

        <h2>Conjuros</h2>
        <div id="Conjuros"></div>

        <div class="divider"><span class="divider-icon">✨</span></div>

        <h2>Trucos</h2>
        <div id="Trucos"></div>

        <div class="divider"><span class="divider-icon">🎒</span></div>

        <h2>Equipo</h2>
        <div id="equipo"></div>

        <div class="divider"><span class="divider-icon">✍️</span></div>

        <h2>Notas</h2>
        <div id="notas"></div>

        <img src="img/Rosa.png" class="rosa-footer">

    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
